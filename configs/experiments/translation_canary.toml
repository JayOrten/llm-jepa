# Canary test: tiny model (~37M) on small translation subset.
# Verifies pipeline works before committing cluster hours.
#
# Regular baseline:
#   python train.py --config configs/experiments/translation_canary.toml
# STP:
#   python train.py --config configs/experiments/translation_canary.toml --set strategy.name=stp

[model]
name = "configs/models/llama-tiny"
tokenizer_name = "meta-llama/Llama-3.2-1B-Instruct"
use_lora = false
pretrain = true

[data]
train_file = "datasets/opus_train.jsonl"
eval_file = "datasets/opus_eval.jsonl"
max_length = 128
plain = true
train_all = false
max_train_samples = 100000
max_eval_samples = 500

[training]
output_dir = "./output-canary"
batch_size = 16
grad_accum = 8
learning_rate = 3e-4
lr_scheduler_type = "cosine"
warmup_steps = 100
weight_decay = 0.01
num_epochs = 1
eval_steps = 50
seed = 42
enable_save = true

[strategy]
name = "regular"
lambda_ = 0.02
last_token = -2
loss_type = "cosine"

[strategy.stp]
linear_mode = "random_span"

[evaluation]
original_model_name = "configs/models/llama-tiny"
