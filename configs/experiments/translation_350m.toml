# Full 350M Llama from-scratch training on OPUS-100 multilingual translation.
#
# Regular baseline:
#   python train.py --config configs/experiments/translation_350m.toml
# STP:
#   python train.py --config configs/experiments/translation_350m.toml --set strategy.name=stp

[model]
name = "configs/models/llama-350m"
tokenizer_name = "meta-llama/Llama-3.2-1B-Instruct"
use_lora = false
pretrain = true

[data]
train_file = "datasets/opus_train.jsonl"
eval_file = "datasets/opus_eval.jsonl"
max_length = 256
plain = true
train_all = false

[training]
output_dir = "./output-translation-350m"
batch_size = 32
grad_accum = 8
learning_rate = 3e-4
lr_scheduler_type = "cosine"
warmup_steps = 2000
weight_decay = 0.1
num_epochs = 3
eval_steps = 500
seed = 42
enable_save = true

[strategy]
name = "regular"
lambda_ = 0.02
last_token = -2
loss_type = "cosine"

[strategy.stp]
linear_mode = "random_span"
